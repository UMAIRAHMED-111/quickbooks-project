name: Frontend CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
    paths:
      - "quickbooks-dataengineering-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "quickbooks-dataengineering-frontend/**"
      - ".github/workflows/frontend-ci.yml"

defaults:
  run:
    working-directory: quickbooks-dataengineering-frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: quickbooks-dataengineering-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx prettier --check "src/**/*.{ts,tsx}"

  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: quickbooks-dataengineering-frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: quickbooks-dataengineering-frontend/dist/
          retention-days: 7
