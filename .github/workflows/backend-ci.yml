name: Backend CI

on:
  push:
    paths:
      - "quickbooks-dataengineering-pipeline/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "quickbooks-dataengineering-pipeline/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: quickbooks-dataengineering-pipeline

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            quickbooks-dataengineering-pipeline/requirements.txt
            quickbooks-dataengineering-pipeline/pyproject.toml

      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      N8N_WEBHOOK_URL: http://localhost:9999/webhook
      OPENAI_API_KEY_1: test-key
      GEMINI_API_KEY: test-key
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            quickbooks-dataengineering-pipeline/requirements.txt
            quickbooks-dataengineering-pipeline/pyproject.toml

      - run: pip install -r requirements.txt
      - run: pip install -e ".[dev]"

      - name: Run migrations
        run: |
          for f in $(ls ../supabase/migrations/*.sql 2>/dev/null | sort); do
            psql "$DATABASE_URL" -f "$f"
          done

      - run: python -m pytest -q
